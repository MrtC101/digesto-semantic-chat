name: Build & Deploy Frontend

on:
  workflow_dispatch: 
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'homo'
        type: choice
        options:
          - homo
          - prod

env:
  APP_NAME: frontend
  DEPLOY_DIR: /home/hgarrido/DigestoSemanticSearch/frontend

jobs:
  build-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build deploy

      - name: Pack artifact
        run: tar -czf .artifacts/${APP_NAME}-${{ steps.version.outputs.version }}.tar.gz deploy

      - name: Set deploy target
        run: |
          if [ "${{ github.event.inputs.target }}" = "homo" ]; then
            echo "TARGET_HOST=${{ secrets.HOMO_HOST }}" >> $GITHUB_ENV
          else
            echo "TARGET_HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
          fi

      - name: Upload & deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "./.artifacts/${APP_NAME}-${{ steps.version.outputs.version }}.tar.gz"
          target: "${DEPLOY_DIR}/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            RELEASE=${{ steps.version.outputs.version }}
            mkdir -p $DEPLOY_DIR/$RELEASE
            tar -xzf $DEPLOY_DIR/${APP_NAME}-$RELEASE.tar.gz -C $DEPLOY_DIR/$RELEASE
            ln -sfn $DEPLOY_DIR/$RELEASE $DEPLOY_DIR/current
            rm $DEPLOY_DIR/${APP_NAME}-$RELEASE.tar.gz