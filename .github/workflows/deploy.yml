name: Build & Deploy Frontend

on:
  workflow_dispatch: 
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'homo'
        type: choice
        options:
          - homo
          - prod

env:
  APP_NAME: frontend
  DEPLOY_DIR: /home/hgarrido/DigestoSemanticSearch/frontend

jobs:
  build-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build-workflow

      - name: Create tarball
        run: |
          cd dist
          tar -czf ../dist.tar.gz .
          cd ..

      - name: Set deploy target
        run: |
          if [ "${{ github.event.inputs.target }}" = "homo" ]; then
            echo "TARGET_HOST=${{ secrets.HOMO_HOST }}" >> $GITHUB_ENV
          else
            echo "TARGET_HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
          fi

      - name: Upload tarball
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "dist.tar.gz"
          target: "~/"

      - name: Extract and cleanup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            RELEASE=${{ steps.version.outputs.version }}
            DEPLOY_DIR=${{ env.DEPLOY_DIR }}
            
            mv ~/dist.tar.gz $DEPLOY_DIR/
            cd $DEPLOY_DIR
            mkdir -p $RELEASE
            cd $RELEASE
            tar -xzf ../dist.tar.gz
            cd ..
            rm dist.tar.gz
            ln -sfn $RELEASE current
            echo "Deployed version: $RELEASE"
            ls -lah