name: Build & Deploy Frontend

on:
  release:
    types: [published]

env:
  APP_NAME: frontend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Pack artifact
        run: |
          tar -czf ${APP_NAME}-${{ steps.version.outputs.version }}.tar.gz dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}
          path: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.tar.gz

  deploy-homo:
    needs: build
    runs-on: ubuntu-latest
    environment: homo
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ needs.build.outputs.version }}

      - name: Deploy to homo
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          VERSION: ${{ needs.build.outputs.version }}
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          scp ${APP_NAME}-${VERSION}.tar.gz \
            ${SSH_USER}@${SSH_HOST}:/tmp/${APP_NAME}-${VERSION}.tar.gz

          ssh ${SSH_USER}@${SSH_HOST} \
            "bash /opt/deploy_frontend.sh ${APP_NAME} ${VERSION}"

  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ needs.build.outputs.version }}

      - name: Deploy to prod
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          VERSION: ${{ needs.build.outputs.version }}
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          scp ${APP_NAME}-${VERSION}.tar.gz \
            ${SSH_USER}@${SSH_HOST}:/tmp/${APP_NAME}-${VERSION}.tar.gz

          ssh ${SSH_USER}@${SSH_HOST} \
            "bash /opt/deploy_frontend.sh ${APP_NAME} ${VERSION}"
